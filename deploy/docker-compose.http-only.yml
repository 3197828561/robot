services:
  postgres:
    image: postgres:16-alpine
    container_name: vgsolar-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "PGPASSWORD=\"$${POSTGRES_PASSWORD}\" psql -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\" -c 'SELECT 1' >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: vgsolar-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      JWT_SECRET: ${JWT_SECRET}
      API_BOOTSTRAP_EMAIL: ${API_BOOTSTRAP_EMAIL}
      API_BOOTSTRAP_PASSWORD: ${API_BOOTSTRAP_PASSWORD}
      PUBLIC_HOST: ${PUBLIC_HOST}
      MAP_STATIC_ROOT: /opt/robot-platform/static/maps
      MAP_PUBLIC_BASE_URL: ${MAP_PUBLIC_BASE_URL}
      MAP_UPLOAD_TOKEN: ${MAP_UPLOAD_TOKEN}
    volumes:
      - /opt/robot-platform/static/maps:/opt/robot-platform/static/maps
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()\""]
      interval: 10s
      timeout: 5s
      retries: 12

  nginx:
    image: nginx:1.27-alpine
    container_name: vgsolar-nginx
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - /opt/robot-platform/static/maps:/usr/share/nginx/html/maps:ro

volumes:
  postgres_data:
