services:
  postgres:
    image: postgres:16-alpine
    container_name: vgsolar-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  emqx:
    image: emqx/emqx:5.8.3
    container_name: vgsolar-emqx
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "18083:18083"
    environment:
      EMQX_ALLOW_ANONYMOUS: "false"
    volumes:
      - emqx_data:/opt/emqx/data

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: vgsolar-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      API_BOOTSTRAP_EMAIL: ${API_BOOTSTRAP_EMAIL}
      API_BOOTSTRAP_PASSWORD: ${API_BOOTSTRAP_PASSWORD}
      PUBLIC_HOST: ${PUBLIC_HOST}
    expose:
      - "8000"

  nginx:
    image: nginx:1.27-alpine
    container_name: vgsolar-nginx
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
      # 启用 HTTPS 时取消下一行注释，并挂载 Let's Encrypt 证书目录
      # - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      # 启用 HTTPS 时取消下一行注释
      # - /etc/letsencrypt:/etc/letsencrypt:ro

volumes:
  postgres_data:
  emqx_data:
